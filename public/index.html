<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#075E54" />
    <meta name="description" content="Shop fresh products directly from our collection" />

    <!-- Open Graph for link previews in WhatsApp -->
    <meta property="og:title" content="My Store — Fresh Collection" />
    <meta property="og:description" content="Browse and order the latest products" />
    <meta property="og:type" content="website" />

    <title>%REACT_APP_STORE_NAME%</title>

    <!-- Prevent flash of unstyled content -->
    <style>
      body { margin: 0; background: #f5f5f5; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <noscript>Please enable JavaScript to use this store.</noscript>
    <div id="root"></div>
  </body>
</html>
